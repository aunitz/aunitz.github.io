---
layout: default
---

<style>
/* Cabecera del dashboard con SVG animado inline (los SVG animados no animan como background-image) */
.intro-header.dashboard-hero { position: relative; overflow: hidden; background: #0f172a; }
.dashboard-hero-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
.dashboard-hero-bg svg { width: 100%; height: 100%; display: block; }
/* Velo oscuro sutil para garantizar el contraste del título blanco sobre el SVG */
.dashboard-hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(15,23,42,.15) 0%, rgba(15,23,42,.60) 100%); }
.dashboard-hero .container { position: relative; z-index: 2; }
</style>

<!-- Page Header -->
<header class="intro-header dashboard-hero" role="img" aria-label="Constelación abstracta de nodos de datos interconectados que representa las métricas del blog">
    <div class="dashboard-hero-bg" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" preserveAspectRatio="xMidYMid slice">
          <title>Constelación de datos del blog</title>
          <desc>Red abstracta de nodos luminosos interconectados por líneas tenues, con partículas que recorren las conexiones, sobre un fondo oscuro. Metáfora de las métricas del blog: posts, enlaces y etiquetas interrelacionados y activos.</desc>

          <defs>
            <!-- Fondo oscuro en degradado diagonal -->
            <linearGradient id="dashBg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#0f172a" />
              <stop offset="100%" stop-color="#1e293b" />
            </linearGradient>
            <!-- Resplandor sutil para los nodos destacados -->
            <filter id="dashGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="7" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>

          <!-- Fondo -->
          <rect width="1600" height="480" fill="url(#dashBg)" />

          <!-- Auras difusas de fondo (profundidad); respiran lentamente -->
          <g>
            <circle cx="820" cy="230" r="90" fill="#6366f1" opacity="0.10">
              <animate attributeName="r" values="86;98;86" dur="6s" repeatCount="indefinite" />
            </circle>
            <circle cx="1130" cy="300" r="70" fill="#3b82f6" opacity="0.08">
              <animate attributeName="r" values="66;76;66" dur="5s" repeatCount="indefinite" />
            </circle>
            <circle cx="330" cy="290" r="70" fill="#8b5cf6" opacity="0.07">
              <animate attributeName="r" values="66;78;66" dur="6.5s" repeatCount="indefinite" />
            </circle>
          </g>

          <!-- Conexiones de la red (aristas); un par respira en opacidad -->
          <g stroke="#475569" stroke-width="1.5" fill="none">
            <line x1="180" y1="150" x2="330" y2="300" opacity="0.35" />
            <line x1="180" y1="150" x2="520" y2="110" opacity="0.30" />
            <line x1="330" y1="300" x2="520" y2="110" opacity="0.35" />
            <line x1="330" y1="300" x2="660" y2="340" opacity="0.30" />
            <line x1="520" y1="110" x2="660" y2="340" opacity="0.28" />
            <line x1="520" y1="110" x2="820" y2="230" opacity="0.35">
              <animate attributeName="opacity" values="0.25;0.5;0.25" dur="4.5s" repeatCount="indefinite" />
            </line>
            <line x1="660" y1="340" x2="820" y2="230" opacity="0.40" />
            <line x1="820" y1="230" x2="760" y2="150" opacity="0.35" />
            <line x1="820" y1="230" x2="980" y2="120" opacity="0.35" />
            <line x1="820" y1="230" x2="1130" y2="300" opacity="0.30" />
            <line x1="760" y1="150" x2="980" y2="120" opacity="0.28" />
            <line x1="980" y1="120" x2="1300" y2="170" opacity="0.28" />
            <line x1="1130" y1="300" x2="1300" y2="170" opacity="0.35">
              <animate attributeName="opacity" values="0.25;0.5;0.25" dur="5.5s" repeatCount="indefinite" />
            </line>
            <line x1="1130" y1="300" x2="1450" y2="300" opacity="0.30" />
            <line x1="1300" y1="170" x2="1450" y2="300" opacity="0.30" />
          </g>

          <!-- Nodos de la red -->
          <!-- Nodos con pulso de radio (actividad viva) -->
          <circle cx="180" cy="150" r="5" fill="#3b82f6">
            <animate attributeName="r" values="5;7;5" dur="3.4s" repeatCount="indefinite" />
          </circle>
          <circle cx="980" cy="120" r="6" fill="#3b82f6">
            <animate attributeName="r" values="6;8.5;6" dur="4.2s" repeatCount="indefinite" />
          </circle>
          <circle cx="1300" cy="170" r="5" fill="#3b82f6">
            <animate attributeName="r" values="5;7;5" dur="3.8s" repeatCount="indefinite" />
          </circle>

          <!-- Nodos con pulso de opacidad (actividad intermitente) -->
          <circle cx="520" cy="110" r="5" fill="#6366f1">
            <animate attributeName="opacity" values="1;0.45;1" dur="3.2s" repeatCount="indefinite" />
          </circle>
          <circle cx="660" cy="340" r="6" fill="#8b5cf6">
            <animate attributeName="opacity" values="1;0.5;1" dur="3.8s" repeatCount="indefinite" />
          </circle>
          <circle cx="330" cy="300" r="6" fill="#6366f1">
            <animate attributeName="opacity" values="1;0.5;1" dur="4.4s" repeatCount="indefinite" />
          </circle>
          <circle cx="1130" cy="300" r="6" fill="#6366f1">
            <animate attributeName="opacity" values="1;0.5;1" dur="3.6s" repeatCount="indefinite" />
          </circle>
          <circle cx="1450" cy="300" r="5" fill="#8b5cf6">
            <animate attributeName="opacity" values="1;0.5;1" dur="4.8s" repeatCount="indefinite" />
          </circle>

          <!-- Nodo-acento verde (una "métrica destacada"); con glow y pulso de radio -->
          <circle cx="760" cy="150" r="7" fill="#10b981" filter="url(#dashGlow)">
            <animate attributeName="r" values="6.5;9;6.5" dur="4s" repeatCount="indefinite" />
          </circle>

          <!-- NÚCLEO central (hub principal); glow amplio y respiración de radio -->
          <circle cx="820" cy="230" r="11" fill="#8b5cf6" filter="url(#dashGlow)">
            <animate attributeName="r" values="10;13;10" dur="4.6s" repeatCount="indefinite" />
          </circle>

          <!-- Partículas que recorren algunas conexiones (flujo de datos), con fundido -->
          <circle r="3.5" fill="#60a5fa">
            <animateMotion dur="5s" repeatCount="indefinite" path="M 660,340 L 820,230" />
            <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
          </circle>
          <circle r="3.5" fill="#60a5fa">
            <animateMotion dur="4.5s" repeatCount="indefinite" path="M 820,230 L 980,120" />
            <animate attributeName="opacity" values="0;1;0" dur="4.5s" repeatCount="indefinite" />
          </circle>
          <circle r="3.5" fill="#a78bfa">
            <animateMotion dur="6s" repeatCount="indefinite" path="M 1130,300 L 1450,300" />
            <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
          </circle>
          <circle r="3.5" fill="#818cf8">
            <animateMotion dur="5.5s" repeatCount="indefinite" path="M 330,300 L 180,150" />
            <animate attributeName="opacity" values="0;1;0" dur="5.5s" repeatCount="indefinite" />
          </circle>

          <!-- Decorativos: puntos tenues sueltos (datos ambientales) -->
          <g fill="#94a3b8" opacity="0.35">
            <circle cx="440" cy="410" r="2" />
            <circle cx="1240" cy="80" r="2" />
            <circle cx="1010" cy="400" r="2" />
            <circle cx="120" cy="360" r="2" />
          </g>
        </svg>
    </div>
    <div class="dashboard-hero-overlay" aria-hidden="true"></div>

    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <div class="site-heading">
                    <h1>{% if page.title %}{{ page.title }}{% else %}{{ site.subtitle }}{% endif %}</h1>
                    <hr class="small">
                    <span class="subheading">{{ page.subtitle }}</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="container">
	<div class="row">
		<div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
			<main class="page-content">
				{{ content }}
			</main>
		</div>
	</div>
</div>

<hr>
