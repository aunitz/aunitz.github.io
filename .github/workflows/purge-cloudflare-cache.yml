name: Purge Cloudflare Cache

on:
  deployment_status:

jobs:
  purge-cache:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous successful deployment SHA
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_SHA="${{ github.event.deployment.sha }}"
          echo "Current deploy SHA: $CURRENT_SHA"

          deployments=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=50" \
            --jq '.[] | "\(.id) \(.sha)"')

          PREV_SHA=""
          while IFS= read -r line; do
            id=$(echo "$line" | awk '{print $1}')
            sha=$(echo "$line" | awk '{print $2}')
            [ -z "$id" ] && continue
            [ "$sha" = "$CURRENT_SHA" ] && continue
            # GitHub Pages adds an "inactive" status to prior deployments when a
            # new one becomes active, so checking only .[0] misses deploys that
            # did succeed. Look for any "success" status in the history instead.
            success_count=$(gh api "repos/${{ github.repository }}/deployments/$id/statuses" --jq '[.[] | select(.state == "success")] | length')
            if [ "$success_count" -gt 0 ]; then
              PREV_SHA="$sha"
              break
            fi
          done <<< "$deployments"

          echo "Previous successful deploy SHA: $PREV_SHA"
          echo "sha=$PREV_SHA" >> $GITHUB_OUTPUT

      - name: Detect changes since last successful deploy
        id: changes
        run: |
          PREV_SHA="${{ steps.prev.outputs.sha }}"
          CURRENT_SHA="${{ github.event.deployment.sha }}"

          if [ -z "$PREV_SHA" ]; then
            echo "No previous successful deploy found; purging static URLs only."
            echo "css=true" >> $GITHUB_OUTPUT
            echo "posts=true" >> $GITHUB_OUTPUT
            echo "post_urls=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Make sure both SHAs are present locally
          git fetch --no-tags --depth=100 origin "$PREV_SHA" "$CURRENT_SHA" 2>/dev/null || true

          echo "Files changed between $PREV_SHA and $CURRENT_SHA:"
          git diff --name-only "$PREV_SHA" "$CURRENT_SHA" || true

          if git diff --name-only "$PREV_SHA" "$CURRENT_SHA" -- css/ | grep -q .; then
            echo "css=true" >> $GITHUB_OUTPUT
          else
            echo "css=false" >> $GITHUB_OUTPUT
          fi

          # For each post added/modified/deleted/renamed, compute its URL at PREV_SHA
          # and at CURRENT_SHA so we purge the old URL, the new URL, or both.
          python3 - "$PREV_SHA" "$CURRENT_SHA" > urls.json <<'PY'
          import json, os, re, subprocess, sys

          prev_sha, curr_sha = sys.argv[1], sys.argv[2]
          SITE = "https://www.aunitz.net"

          def changed_posts():
              out = subprocess.run(
                  ["git", "diff", "--name-status", "-M", prev_sha, curr_sha, "--", "_posts/"],
                  capture_output=True, text=True, check=True,
              ).stdout
              for line in out.splitlines():
                  parts = line.split("\t")
                  status = parts[0]
                  if status.startswith("R") and len(parts) >= 3:
                      yield (prev_sha, parts[1])
                      yield (curr_sha, parts[2])
                  elif status == "A" and len(parts) >= 2:
                      yield (curr_sha, parts[1])
                  elif status == "D" and len(parts) >= 2:
                      yield (prev_sha, parts[1])
                  elif len(parts) >= 2:
                      # M, T, C, etc.
                      yield (prev_sha, parts[1])
                      yield (curr_sha, parts[-1])

          def show(sha, path):
              r = subprocess.run(["git", "show", f"{sha}:{path}"], capture_output=True, text=True)
              return r.stdout if r.returncode == 0 else None

          def parse_frontmatter(text):
              if not text.startswith("---"):
                  return {}
              end = text.find("\n---", 3)
              if end == -1:
                  return {}
              fm = {}
              for line in text[3:end].splitlines():
                  m = re.match(r'^([A-Za-z_][A-Za-z0-9_-]*)\s*:\s*(.*?)\s*$', line)
                  if m:
                      fm[m.group(1)] = m.group(2).strip().strip('"').strip("'")
              return fm

          def url_for(sha, path):
              text = show(sha, path)
              if text is None:
                  return None
              fm = parse_frontmatter(text)
              permalink = fm.get("permalink")
              if not permalink:
                  base = os.path.basename(path)
                  slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', base)
                  slug = re.sub(r'\.(markdown|md|html)$', '', slug, flags=re.IGNORECASE)
                  permalink = f"/{slug}/"
              if not permalink.startswith("/"):
                  permalink = "/" + permalink
              return SITE + permalink

          urls = set()
          for sha, path in changed_posts():
              u = url_for(sha, path)
              if u:
                  urls.add(u)

          print(json.dumps(sorted(urls)))
          PY

          POST_URLS=$(cat urls.json)
          echo "Affected post URLs: $POST_URLS"
          echo "post_urls=$POST_URLS" >> $GITHUB_OUTPUT

          if [ "$POST_URLS" != "[]" ]; then
            echo "posts=true" >> $GITHUB_OUTPUT
          else
            echo "posts=false" >> $GITHUB_OUTPUT
          fi

      - name: Purge Cloudflare cache for affected URLs
        if: steps.changes.outputs.posts == 'true'
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          POST_URLS: ${{ steps.changes.outputs.post_urls }}
        run: |
          python3 <<'PY'
          import json, os, urllib.request

          zone = os.environ["CF_ZONE_ID"]
          token = os.environ["CF_TOKEN"]
          site = "https://www.aunitz.net"

          static = [
              f"{site}/",
              f"{site}/tags/",
              f"{site}/feed.xml",
              f"{site}/sitemap.xml",
          ]
          post_urls = json.loads(os.environ.get("POST_URLS") or "[]")

          # Dedupe while preserving order: static first, then posts.
          seen = set()
          all_urls = []
          for u in static + post_urls:
              if u not in seen:
                  seen.add(u)
                  all_urls.append(u)

          print(f"Purging {len(all_urls)} URL(s):")
          for u in all_urls:
              print(f"  {u}")

          # Cloudflare's purge-by-URL endpoint accepts at most 30 files per call.
          for i in range(0, len(all_urls), 30):
              batch = all_urls[i:i + 30]
              req = urllib.request.Request(
                  f"https://api.cloudflare.com/client/v4/zones/{zone}/purge_cache",
                  data=json.dumps({"files": batch}).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req) as r:
                  print(f"Batch {i // 30 + 1}: {r.read().decode()}")
          PY

      - name: Purge Cloudflare cache for CSS files
        if: steps.changes.outputs.css == 'true'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "files": [
                "https://www.aunitz.net/css/bootstrap.min.css",
                "https://www.aunitz.net/css/clean-blog.min.css"
              ]
            }'
