name: Purge Cloudflare Cache

on:
  deployment_status:

jobs:
  purge-cache:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous successful deployment SHA
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_SHA="${{ github.event.deployment.sha }}"
          echo "Current deploy SHA: $CURRENT_SHA"

          deployments=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=50" \
            --jq '.[] | "\(.id) \(.sha)"')

          PREV_SHA=""
          while IFS= read -r line; do
            id=$(echo "$line" | awk '{print $1}')
            sha=$(echo "$line" | awk '{print $2}')
            [ -z "$id" ] && continue
            [ "$sha" = "$CURRENT_SHA" ] && continue
            state=$(gh api "repos/${{ github.repository }}/deployments/$id/statuses" --jq '.[0].state')
            if [ "$state" = "success" ]; then
              PREV_SHA="$sha"
              break
            fi
          done <<< "$deployments"

          echo "Previous successful deploy SHA: $PREV_SHA"
          echo "sha=$PREV_SHA" >> $GITHUB_OUTPUT

      - name: Detect changes since last successful deploy
        id: changes
        run: |
          PREV_SHA="${{ steps.prev.outputs.sha }}"
          CURRENT_SHA="${{ github.event.deployment.sha }}"

          if [ -z "$PREV_SHA" ]; then
            echo "No previous successful deploy found; purging everything."
            echo "css=true" >> $GITHUB_OUTPUT
            echo "posts=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Make sure both SHAs are present locally
          git fetch --no-tags --depth=100 origin "$PREV_SHA" "$CURRENT_SHA" 2>/dev/null || true

          echo "Files changed between $PREV_SHA and $CURRENT_SHA:"
          git diff --name-only "$PREV_SHA" "$CURRENT_SHA" || true

          if git diff --name-only "$PREV_SHA" "$CURRENT_SHA" -- css/ | grep -q .; then
            echo "css=true" >> $GITHUB_OUTPUT
          else
            echo "css=false" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only "$PREV_SHA" "$CURRENT_SHA" -- _posts/ | grep -q .; then
            echo "posts=true" >> $GITHUB_OUTPUT
          else
            echo "posts=false" >> $GITHUB_OUTPUT
          fi

      - name: Purge Cloudflare cache for key URLs
        if: steps.changes.outputs.posts == 'true'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "files": [
                "https://www.aunitz.net/",
                "https://www.aunitz.net/tags/",
                "https://www.aunitz.net/feed.xml",
                "https://www.aunitz.net/sitemap.xml"
              ]
            }'

      - name: Purge Cloudflare cache for CSS files
        if: steps.changes.outputs.css == 'true'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "files": [
                "https://www.aunitz.net/css/bootstrap.min.css",
                "https://www.aunitz.net/css/bootstrapcdn-bootstrap.min.css",
                "https://www.aunitz.net/css/clean-blog.min.css"
              ]
            }'
